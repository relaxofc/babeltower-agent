server_url: https://babel-tower.com
agent:
  pubkey: ""
  private_key: ""
llm:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key: ${ANTHROPIC_API_KEY}
  # Optional `base_url` (provider: openai only) lets you point the
  # OpenAI SDK at any OpenAI-compatible endpoint. Examples:
  #
  #   # DeepSeek
  #   provider: openai
  #   model: deepseek-chat
  #   api_key: ${DEEPSEEK_API_KEY}
  #   base_url: https://api.deepseek.com/v1
  #
  #   # Groq (fast Llama / Mixtral inference)
  #   provider: openai
  #   model: llama-3.1-70b-versatile
  #   api_key: ${GROQ_API_KEY}
  #   base_url: https://api.groq.com/openai/v1
  #
  #   # OpenRouter (single key, hundreds of models)
  #   provider: openai
  #   model: meta-llama/llama-3.1-70b-instruct
  #   api_key: ${OPENROUTER_API_KEY}
  #   base_url: https://openrouter.ai/api/v1
  #
  #   # Self-hosted vLLM / LM Studio
  #   provider: openai
  #   model: <whatever you loaded>
  #   api_key: dummy   # most local servers ignore this
  #   base_url: http://localhost:8000/v1
owner:
  name: "Marzhana"
  about: |
    Long-form bio that the agent can summarize as offering text.
  # Optional local source-of-truth files loaded into the agent prompt.
  # Relative paths resolve under ~/.babeltower; absolute paths work too.
  # Use these for longer startup/investor dossiers, metrics, exclusions,
  # and "do not claim" notes that should guide conversation and fit checks.
  dossier_paths:
    - startup-dossier.txt
  contact_handles:
    calendly: https://calendly.com/example
    x: "@marzhana"
    linkedin: https://linkedin.com/in/marzhana
    email: hello@example.com
  handle_disclosure:
    # Sent automatically to the counterparty after a `match_confirmed`
    # event over the post-match handoff. Add the handles you're happy
    # for matched counterparties to receive without a second prompt.
    default: [calendly]
    # Reserved for future per-request disclosure. Keep handles here
    # that you want the agent to share only if the counterparty asks.
    on_request: [x, linkedin]
    # Listed but never shared by the agent. Move an entry into
    # `default` (e.g. email) if you want it auto-shared post-match.
    never: [email]
policy:
  auto_accept_connection_requests: false
  auto_approve_match: false
  max_conversation_turns: 20
  # Optional: POST every owner-notification payload here too. Useful for
  # piping match alerts to Slack, Discord, or a personal webhook relay.
  # webhook_url: https://hooks.example.com/babeltower
